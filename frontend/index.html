<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宋代战地医院遗址腐蚀监测系统</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-left">
                <h1>🏛️ 宋代战地医院遗址腐蚀监测系统</h1>
                <p class="subtitle">古代战地医院遗址微环境与出土医疗器具腐蚀监测平台</p>
            </div>
            <div class="header-right">
                <div class="stat-card">
                    <span class="stat-label">遗址面积</span>
                    <span class="stat-value">2,000㎡</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">设备总数</span>
                    <span class="stat-value" id="stat-total">--</span>
                </div>
                <div class="stat-card warning">
                    <span class="stat-label">高风险探头</span>
                    <span class="stat-value" id="stat-risk">--</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">平均腐蚀速率</span>
                    <span class="stat-value" id="stat-avg">--</span>
                </div>
            </div>
        </header>

        <div class="main-content">
            <aside class="sidebar">
                <div class="panel">
                    <h3>📋 设备列表</h3>
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="all">全部 (60)</button>
                        <button class="tab-btn" data-tab="soil">土壤传感器 (40)</button>
                        <button class="tab-btn" data-tab="corrosion">腐蚀探头 (20)</button>
                    </div>
                    <div class="device-list" id="device-list">
                        <div class="loading">加载中...</div>
                    </div>
                </div>

                <div class="panel">
                    <h3>⚙️ 控制面板</h3>
                    <div class="control-group">
                        <label>显示热力图</label>
                        <label class="switch">
                            <input type="checkbox" id="toggle-heatmap" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="control-group">
                        <label>显示传感器</label>
                        <label class="switch">
                            <input type="checkbox" id="toggle-soil" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="control-group">
                        <label>显示腐蚀探头</label>
                        <label class="switch">
                            <input type="checkbox" id="toggle-corrosion" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="control-group">
                        <label>热力图时间范围</label>
                        <select id="heatmap-range">
                            <option value="24">最近 24 小时</option>
                            <option value="168" selected>最近 7 天</option>
                            <option value="720">最近 30 天</option>
                        </select>
                    </div>
                    <button class="btn-primary" id="btn-refresh">🔄 刷新数据</button>
                </div>

                <div class="panel legend-panel">
                    <h3>📊 图例说明</h3>
                    <div class="legend-item">
                        <div class="legend-color soil-sensor"></div>
                        <span>土壤温湿度/pH/氯离子传感器</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color iron-probe"></div>
                        <span>铁器腐蚀监测探头</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color copper-probe"></div>
                        <span>铜器腐蚀监测探头</span>
                    </div>
                    <div class="legend-gradient">
                        <div class="gradient-bar"></div>
                        <div class="gradient-labels">
                            <span>低风险</span>
                            <span>中风险</span>
                            <span>高风险</span>
                        </div>
                    </div>
                </div>
            </aside>

            <section class="map-section">
                <div id="map"></div>
                <canvas id="heatmap-canvas"></canvas>
            </section>
        </div>

        <div id="detail-modal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">探头详情</h2>
                    <button class="close-btn" id="close-modal">&times;</button>
                </div>
                <div class="modal-body" id="modal-body">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/MapView.js"></script>
    <script src="js/CorrosionPanel.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
